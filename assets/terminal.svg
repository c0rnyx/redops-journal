<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Transparent Background (no fill) -->
  
  <!-- Terminal Window (Green Tint) -->
  <rect x="90" y="118" width="332" height="276" rx="40" ry="40" fill="#003300" stroke="#00FF00" stroke-width="10"/>
  
  <!-- Window Header Bar (Lighter Green) -->
  <rect x="90" y="118" width="332" height="60" rx="40" ry="40" fill="#006600"/>
  <!-- Covering the bottom corners so the header bar appears flat on top -->
  <rect x="90" y="158" width="332" height="20" fill="#006600"/>
  
  <!-- Window Controls (Red, Yellow, Green dots in grey/black) -->
  <circle cx="135" cy="148" r="12" fill="#FF5F56"/>
  <circle cx="170" cy="148" r="12" fill="#FFBD2E"/>
  <circle cx="205" cy="148" r="12" fill="#27C93F"/>

  <!-- Terminal Prompt (Saturated Green) -->
  <!-- The '>' sign -->
  <path d="M145 280 L 185 250 L 145 220" fill="none" stroke="#00FF00" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- The '_' cursor -->
  <rect x="210" y="262" width="40" height="16" rx="8" ry="8" fill="#00FF00"/>
</svg>