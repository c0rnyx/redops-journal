site_name: RedOps Journal
site_url: https://c0rnyx.github.io/redops-journal/
site_description: THM, eCPPT, Offensive Security Portfolio

plugins:
  - search
  - awesome-pages
  - glightbox

theme:
  name: material

  palette:
    - scheme: slate

  font:
    text: Inter
    code: JetBrains Mono

  favicon: assets/favicon.png
  logo: assets/logo.svg

  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/c0rnyx
    - icon: fontawesome/solid/shield
      link: https://tryhackme.com/p/sam11


